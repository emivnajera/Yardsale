<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            --very-light-pink: #C7C7C7;
            --text-input-field: #f7f7f7;
            --hospital-green: #acd9b2;
            --white: #ffffff;
            --black: #000000;
            --sm: 14px;
            --md: 16px;
            --lg: 18px
        }
        .login{
            width: 100%;
            height: 100vh;
            display:  grid;
            place-items: center;
        }
        body{
            font-family: 'Quicksand', sans-serif;
            margin: 0;
        }
        .form-container{
            display: grid;
            grid-template-rows: auto 1fr
            auto;
            width: 300px;
        }
        .logo{
            width: 150px;
            margin-bottom: 48px;
            justify-self: center;
            display: none;
        }
        .title{
            font-size: var(--lg);
            margin-bottom: 12px;
            text-align: center;
        }
        .subtitle{
            color: var(--very-light-pink);
            font-size: var(--md);
            font-weight: 300px;
            margin-top: 0;
            margin-bottom: 32px;
            text-align: center;
        }
        .form{
            display: flex;
            flex-direction: column;
        }
        .label{
            font-size: var(--sm);
            font-weight: bold;
            margin-bottom: 4px;
        }
        .input{
            background-color: var(--text-input-field);
            border: none;
            border-radius: 8px;
            font-size: var(--md);
            padding: 6px;
            margin-bottom: 12px;
        }
        .primary-button{
            border-radius: 8px;
            background-color: var(--hospital-green);
            border: none;
            color: var(--white);
            width: 100%;
            cursor: pointer;
            font-size: var(--md);
            font-weight: bold;
            height: 50px;
        }
        .login-button{
            margin-top: 14px;
            margin-bottom: 8px;
        }

        .forgot{
            display: flex;
            justify-content: center;
        }

        .forgot a{
            color: var(--hospital-green);
            text-decoration: none;
            font-size: var(--sm);
            margin-bottom: 32px;
        }

        .secondary-button{
            border-radius: 8px;
            border: solid;
            background-color: var(--white);
            color: var(--hospital-green);
            height: 50px;
            width: 100%;
            cursor: pointer;


        }

        @media (max-width: 640px){
            .logo{
                display: block;
            }
            .secondary-button{
                top: 200%;
                position: relative;
            }
        }
    </style>
</head>
<body>
    <div class="login">
        <div class="form-container">
            <img src="/Logos/logo_yard_sale.svg" class="logo">
            <form action="/" class="form">
                <label for="Email" class="label">Email adrress</label>
                <input type="email" id="email" placeholder="email@example.com" class="input input-email">
                <label for="Password" class="label">Password</label>
                <input type="password" id="password" placeholder="********" class="input input-password">
                <input type="submit" id="log in" value="Log in" class="primary-button login-button">
            </form>
            <p class="forgot"><a href="/">Forgot my password</a></p>
            <button class="secondary-button sign-up-button">Sign up</button>
        </div>
    </div>
</body>
</html>
