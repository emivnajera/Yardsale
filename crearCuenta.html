<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        :root{
            --very-light-pink: #C7C7C7;
            --text-input-field: #f7f7f7;
            --hospital-green: #acd9b2;
            --white: #ffffff;
            --black: #000000;
            --sm: 14px;
            --md: 16px;
            --lg: 18px
        }
        .login{
            width: 100%;
            height: 100vh;
            display:  grid;
            place-items: center;
        }
        body{
            font-family: 'Quicksand', sans-serif;
            margin: 0;
        }
        .form-container{
            display: grid;
            grid-template-rows: auto 1fr
            auto;
            width: 300px;
        }
        .logo{
            width: 150px;
            margin-bottom: 48px;
            justify-self: center;
            display: none;
        }
        .title{
            font-size: var(--lg);
            margin-bottom: 12px;
            text-align: left;
            margin-bottom: 35px;
        }

        .form{
            display: flex;
            flex-direction: column;
        }
        .label{
            font-size: var(--sm);
            font-weight: bold;
            margin-bottom: 4px;
        }
        .input{
            background-color: var(--text-input-field);
            border: none;
            border-radius: 8px;
            font-size: var(--md);
            padding: 6px;
            margin-bottom: 25px;
        }
        .primary-button{
            border-radius: 8px;
            background-color: var(--hospital-green);
            border: none;
            color: var(--white);
            width: 100%;
            cursor: pointer;
            font-size: var(--md);
            font-weight: bold;
            height: 50px;
        }
        .login-button{
            margin-top: 14px;
            margin-bottom: 8px;
        }

        .forgot{
            display: flex;
            justify-content: center;
        }

        .forgot a{
            color: var(--hospital-green);
            text-decoration: none;
            font-size: var(--sm);
            margin-bottom: 32px;
        }

        @media (max-width: 640px){
            .form-container{
                height: 100%;
            }

            .form{
                height: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="login">
        <div class="form-container">
           <h1 class = "title">My account</h1>
            <form action="/" class="form">
                <label  class="label" for="name">Name</label>
                <input type="email" id="email" placeholder="Nombre" class="input input-email">
                <label for="Email" class="label">Email adrress</label>
                <input type="email" id="email" placeholder="email@example.com" class="input input-email">
                <label for="Password" class="label">Password</label>
                <input type="password" id="password" placeholder="********" class="input input-password">
                <input type="submit" id="edit" value="Create" class="primary-button login-button">
            </form>
        </div>
    </div>
</body>
</html>
