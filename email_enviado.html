<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
            :root{
            --very-light-pink: #C7C7C7;
            --text-input-field: #f7f7f7;
            --hospital-green: #acd9b2;
            --white: #ffffff;
            --black: #000000;
            --sm: 14px;
            --md: 16px;
            --lg: 18px
        }

        body{
            font-family: 'Quicksand', sans-serif;
            margin: 0;
        }

        .login{
            width: 100%;
            height: 100vh;
            display: grid;
            place-items: center;
        }
        .form-container{
            display: grid;
            grid: auto 1fr
            auto;
            width: 300px;
        }

        .logo{
            width: 150px;
            margin-bottom: 48px;
            justify-self: center;
            display: none;
        }

        .title{
            font-size: var(--lg);
            margin-bottom: 12px;
            text-align: center;
        }
        .subtitle{
            font-size: var(--md);
            margin-bottom: 64px;
            color: var(--very-light-pink);
            text-align: center;
            font-weight: 300px;
            margin-top: 0;
        }

        .email_image{
            display: flex;
            margin-bottom: 24px;
            width: 132px;
            height: 132px;
            border-radius: 50%;
            background-color: var(--text-input-field);
            justify-self: center;
            justify-content: center;
        }

        .email_image img{
            width: 80px;
        }

        .primary-button{
            border: none;
            background-color: var(--hospital-green);
            border-radius: 8px;
            width: 100%;
            height: 50px;
            color: var(--white);
            font-weight: bold;
            font-size: var(--md);
            cursor: pointer;
            margin-bottom: 32px;
        }
        .mensaje{
            text-align: center;
            margin-top: 0;
            font-size: var(--sm);
        }

        .mensaje span{
            color: var(--very-light-pink);
        }

        .reenviar{
            color: var(--hospital-green);
            text-decoration: none;
        }
        @media(max-width:640px){
            .logo{
                display: block;
            }
        }
</style>
<body>
    <div class="login">
        <div class="form-container">
            <img src ="/Logos/logo_yard_sale.svg" class="logo" alt="logo">
            <h1 class="title">Email has been sent!</h1>
            <p class ="subtitle"> Please Check your inbox for instructions on how to reset the password</p>
            <div class="email_image">
                <img src="./Icons/email.svg" class="icono_sobre" alt ="icono_sobre">
            </div>
            <form action="" class="form">
                <input type="submit" value="Login" class="primary-button login-button">
            </form>
            <p class="mensaje">
                <span>Didn't receive this email? </span>
                <a class="reenviar" href="/">Resend</a>
            </p>
        </div>
    </div>
</body>
</html>
