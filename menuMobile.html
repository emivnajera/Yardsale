<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --very-light-pink: #C7C7C7;
            --text-input-field: #f7f7f7;
            --hospital-green: #acd9b2;
            --white: #ffffff;
            --black: #000000;
            --sm: 14px;
            --md: 16px;
            --lg: 18px
        }
        body{
            font-family: 'Quicksand', sans-serif;
            margin: 0;
        }

        .mobile-menu{
            padding: 24px;
        }

        .mobile-menu ul{
            list-style: none;
        }

        .mobile-menu ul li a{
            text-decoration: none;
            color: var(--black);
        }

        .mobile-menu ul li{
            margin-bottom: 30px;
        }

        .mobile-menu ul{
            margin-bottom: 100px;
        }

        .mobile-menu ul:nth-child(1){
            font-weight: bold;
            font-size: var(--md);
        }

        .mobile-menu ul:nth-child(2){
            font-weight: bold;
            font-size: var(--md);
        }

        .mobile-menu ul:nth-child(3){
            font-size: var(--sm);
        }

        .mobile-menu ul:nth-child(3) li{
            margin-bottom: 4px;
        }

        .mobile-menu ul:nth-child(3) li:nth-child(1) a{
            color: var(--very-light-pink);
        }
        .mobile-menu ul:nth-child(3) li:nth-child(2) a{
            color: var(--hospital-green);
        }
    </style>
</head>
<body>
    <div class="mobile-menu">
        <ul>
            <li>
                <a href="/">CATEGORIES</a>
            </li>
            <li>
                <a href="/">All</a>
            </li>
            <li>
                <a href="/">Electronics</a>
            </li>
            <li>
                <a href="/">Furnitures</a>
            </li>
            <li>
                <a href="/">Toys</a>
            </li>
            <li>
                <a href="/">Others</a>
            </li>
        </ul>

        <ul>
            <li>
                <a href="/">My others</a>
            </li>
            <li>
                <a href="/">My account</a>
            </li>
        </ul>

        <ul>
            <li>
                <a href="/" class="email">email@example.com</a>
            </li>
            <li>
                <a href="/" class="sign-out">Sign out</a>
            </li>
        </ul>
    </div>
</body>
</html>
